<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #111827;
      color: white;
      box-sizing: border-box;
    }

    .header a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.9;
    }

    .wrapper {
      height: calc(100% - 60px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    .notice {
      padding: 14px 20px;
      background: #fff3cd;
      color: #856404;
      font-size: 14px;
      border-bottom: 1px solid #ffe69c;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>My AWS Dashboard</div>
    <a href="http://54.66.71.212/" target="_blank" rel="noopener noreferrer">
      Open in new tab
    </a>
  </div>

  <div class="notice">
    Replace the iframe src below with your HTTPS dashboard URL.
    Plain HTTP will usually be blocked on GitHub Pages.
  </div>

  <div class="wrapper">
    <iframe
      src="http://54.66.71.212/"
      title="Dashboard"
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
